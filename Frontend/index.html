<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Buraq Pilgrim</title>
</head>

<body>
  <div id="root"></div>

  <!-- Hidden Google Translate Element -->
  <div id="google_translate_element" style="display:none;"></div>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        {
          pageLanguage: "en",
          includedLanguages: "en,ur,ar",
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        },
        "google_translate_element"
      );
    }
  </script>


 <script>
  window.addEventListener('load', function() {
    setTimeout(() => {
      const frames = document.querySelectorAll('.goog-te-banner-frame, .goog-te-menu-frame');
      frames.forEach(f => f.style.display = 'none');
      document.body.style.top = '0px';
    }, 1000);
  });
</script>

<script>
  function hideGoogleTranslateElements() {
    const gtBanner = document.querySelector('.goog-te-banner-frame');
    const skiptranslate = document.querySelector('.skiptranslate');
    if (gtBanner) gtBanner.style.display = 'none';
    if (skiptranslate) skiptranslate.style.display = 'none';
    document.body.style.top = '0px';
  }

  // Run every 500 ms for 5 seconds (Google injects late)
  let tries = 0;
  const interval = setInterval(() => {
    hideGoogleTranslateElements();
    tries++;
    if (tries > 10) clearInterval(interval);
  }, 500);

  window.addEventListener('load', hideGoogleTranslateElements);
</script>




  <script
    type="text/javascript"
    src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
  ></script>

  <script type="module" src="/src/main.jsx"></script>
  <script src="https://unpkg.com/lenis@1.3.8/dist/lenis.min.js"></script>
  <script>
    // Exposed so modals can call stop()/start() — otherwise Lenis scrolls the page behind overlays.
    window.__lenis = new Lenis({ autoRaf: true });
  </script>
</body>

</html>
